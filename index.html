<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>去月球起飞基地</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #04060f;
      --panel:     rgba(10, 18, 40, 0.85);
      --border:    rgba(100, 180, 255, 0.15);
      --glow:      #4fc3f7;
      --glow2:     #a78bfa;
      --text:      #e8f4ff;
      --muted:     rgba(200, 220, 255, 0.45);
      --user-bg:   rgba(79, 195, 247, 0.1);
      --ai-bg:     rgba(167, 139, 250, 0.08);
      --font:      'Helvetica Neue', Arial, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ── 星空背景 ── */
    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── 布局 ── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* ── LOGO ── */
    #logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.4rem 0 0.8rem;
      gap: 1rem;
      flex-shrink: 0;
    }

    .logo-svg-wrap {
      position: relative;
      width: 64px;
      height: 64px;
      flex-shrink: 0;
    }
    .logo-svg-wrap svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 10px #4fc3f7aa) drop-shadow(0 0 24px #a78bfa66);
    }

    .logo-text-wrap {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }
    .logo-cn {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      background: linear-gradient(90deg, #4fc3f7, #a78bfa, #4fc3f7);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }
    .logo-en {
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* ── API KEY 设置栏（已隐藏，Key 由系统保管）─ */
    #setup-bar {
      display: none;
    }
    #setup-bar label {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    #api-key-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      color: var(--glow);
      font-size: 0.78rem;
      font-family: 'Courier New', monospace;
      width: 260px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.05em;
    }
    #api-key-input::placeholder { color: var(--muted); font-family: var(--font); letter-spacing: 0; }
    #api-key-input:focus {
      border-color: rgba(79, 195, 247, 0.5);
      box-shadow: 0 0 10px rgba(79, 195, 247, 0.15);
    }
    #api-key-input.set { border-color: rgba(167, 139, 250, 0.5); }
    #save-key-btn {
      padding: 0.35rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(167, 139, 250, 0.4);
      background: rgba(167, 139, 250, 0.1);
      color: var(--glow2);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #save-key-btn:hover { background: rgba(167, 139, 250, 0.22); }
    #key-status {
      font-size: 0.65rem;
      color: rgba(200, 220, 255, 0.35);
      letter-spacing: 0.1em;
    }
    #key-status.ok { color: #4ade80; }

    /* ── 模型切换 ── */
    #model-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.3rem 0 0.6rem;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .model-label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .model-btn {
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .model-btn:hover {
      border-color: var(--glow);
      color: var(--glow);
    }
    .model-btn.active {
      border-color: var(--glow);
      background: rgba(79, 195, 247, 0.12);
      color: var(--glow);
      box-shadow: 0 0 10px rgba(79, 195, 247, 0.25);
    }

    /* ── 对话区 ── */
    #chat-wrap {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 0 40px rgba(79, 195, 247, 0.06), 0 0 80px rgba(167, 139, 250, 0.04);
      margin-bottom: 0.8rem;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.5rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(79,195,247,0.2); border-radius: 4px; }

    #welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      color: var(--muted);
      text-align: center;
      padding: 2rem;
      pointer-events: none;
    }
    #welcome .w-icon { font-size: 2.5rem; opacity: 0.4; }
    #welcome .w-title { font-size: 1rem; letter-spacing: 0.1em; }
    #welcome .w-sub { font-size: 0.8rem; line-height: 1.7; max-width: 320px; }

    /* 消息气泡 */
    .msg { display: flex; gap: 0.8rem; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }
    .msg.user .msg-avatar {
      background: rgba(79, 195, 247, 0.2);
      border: 1px solid rgba(79, 195, 247, 0.3);
    }
    .msg.ai .msg-avatar {
      background: rgba(167, 139, 250, 0.2);
      border: 1px solid rgba(167, 139, 250, 0.3);
    }

    .msg-bubble {
      max-width: 72%;
      padding: 0.75rem 1.1rem;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.75;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid rgba(79, 195, 247, 0.2);
      border-top-right-radius: 3px;
      color: var(--text);
    }
    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid rgba(167, 139, 250, 0.18);
      border-top-left-radius: 3px;
      color: var(--text);
    }
    .msg-model-tag {
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 0.3rem;
      text-transform: uppercase;
    }

    /* 打字动画 */
    .typing-dot {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 0.2rem 0;
    }
    .typing-dot span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--glow2);
      animation: blink 1.2s ease-in-out infinite;
    }
    .typing-dot span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
      40%          { opacity: 1;   transform: scale(1.1); }
    }

    /* API 错误提示 */
    .api-error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.78rem;
      color: #fca5a5;
      text-align: center;
      line-height: 1.6;
    }

    /* ── 输入区 ── */
    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 0.7rem;
      padding: 0.9rem 1rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 1rem;
      color: var(--text);
      font-size: 0.92rem;
      font-family: var(--font);
      resize: none;
      outline: none;
      line-height: 1.6;
      max-height: 140px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #user-input::placeholder { color: var(--muted); }
    #user-input:focus {
      border-color: rgba(79, 195, 247, 0.4);
      box-shadow: 0 0 12px rgba(79, 195, 247, 0.1);
    }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      border: 1px solid rgba(79, 195, 247, 0.35);
      background: rgba(79, 195, 247, 0.1);
      color: var(--glow);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    #send-btn:hover {
      background: rgba(79, 195, 247, 0.22);
      box-shadow: 0 0 14px rgba(79, 195, 247, 0.3);
    }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; }

    /* ── Footer ── */
    #footer-tip {
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: rgba(200,220,255,0.2);
      padding-bottom: 0.6rem;
      flex-shrink: 0;
    }

    /* ── 响应式 ── */
    @media (max-width: 600px) {
      #logo-area { padding: 1rem 0 0.5rem; }
      .logo-cn { font-size: 1.15rem; }
      .logo-svg-wrap { width: 48px; height: 48px; }
      #messages { padding: 1rem 1rem 0.5rem; }
      .msg-bubble { max-width: 85%; font-size: 0.88rem; }
      #api-key-input { width: 160px; }
    }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="app">

  <!-- LOGO -->
  <div id="logo-area">
    <div class="logo-svg-wrap">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="moonGrad" cx="50%" cy="40%" r="50%">
            <stop offset="0%" stop-color="#c8e6ff"/>

        <circle cx="32" cy="26" r="1.8" fill="rgba(79,195,247,0.9)" filter="url(#glow)"/>
        <path d="M29 36 L25 42 L29 40 Z" fill="rgba(167,139,250,0.7)"/>
        <path d="M35 36 L39 42 L35 40 Z" fill="rgba(167,139,250,0.7)"/>
        <circle cx="10" cy="10" r="0.8" fill="white" opacity="0.8"/>

  <!-- 模型切换 -->
  <div id="model-bar">
    <span class="model-label">模型</span>

<script>
/* ── 星空 ── */
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    const count = Math.floor((W * H) / 4000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        da: (Math.random() - 0.5) * 0.005,
        color: Math.random() > 0.85
          ? `rgba(167,139,250,${Math.random() * 0.8 + 0.2})`
          : `rgba(200,230,255,${Math.random() * 0.8 + 0.2})`
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const bg = ctx.createRadialGradient(W*0.4, H*0.3, 0, W*0.5, H*0.5, Math.max(W,H)*0.8);
    bg.addColorStop(0, '#0a0e1f');
    bg.addColorStop(0.5, '#04060f');
    bg.addColorStop(1, '#020308');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const nebula = ctx.createRadialGradient(W*0.7, H*0.25, 0, W*0.7, H*0.25, W*0.35);
    nebula.addColorStop(0, 'rgba(79,50,120,0.12)');
    nebula.addColorStop(1, 'transparent');
    ctx.fillStyle = nebula;
    ctx.fillRect(0, 0, W, H);

    const nebula2 = ctx.createRadialGradient(W*0.2, H*0.6, 0, W*0.2, H*0.6, W*0.3);
    nebula2.addColorStop(0, 'rgba(20,60,100,0.1)');
    nebula2.addColorStop(1, 'transparent');
    ctx.fillStyle = nebula2;
    ctx.fillRect(0, 0, W, H);

    stars.forEach(s => {
      s.a += s.da;
      if (s.a > 1 || s.a < 0) s.da *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color.replace(/[\d.]+\)$/, s.a + ')');
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); initStars(); });
  resize();
  initStars();
  draw();
})();

/* ── 对话逻辑 ── */
const modelBtns   = document.querySelectorAll('.model-btn');
const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const welcomeEl   = document.getElementById('welcome');

let currentModel = 'GLM-4-Flash';
let isTyping = false;
let apiKey   = localStorage.getItem('zhipu_api_key') || '';

// 模型切换
modelBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    modelBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentModel = btn.dataset.model;
  });
});

// 自动调整输入框高度
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

// Enter 发送
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isTyping) return;

  if (!apiKey) {
    showError('请先在上方填写并保存智谱 API Key');
    return;
  }

  if (welcomeEl) welcomeEl.style.display = 'none';

  // 追加用户消息
  appendMsg('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';

  isTyping = true;
  sendBtn.disabled = true;
  const typingId = appendTyping();

  callZhipuAPI(text).then(reply => {
    removeTyping(typingId);
    appendMsg('ai', reply, currentModel);
  }).catch(err => {
    removeTyping(typingId);
    showError('请求失败：' + err.message + '\n\n请检查 API Key 是否正确，或网络是否正常。');
  }).finally(() => {
    isTyping = false;
    sendBtn.disabled = false;
  });
}

/* ── 智谱 API 调用 ── */
async function callZhipuAPI(userMessage) {
  // 构建历史消息（简单拼接，完整版可做数组管理）
  const conversationHistory = buildConversationHistory(userMessage);

  const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model: currentModel,
      messages: conversationHistory,
      stream: false,
      temperature: 0.7,
      max_tokens: 2048,
    }),
  });

  if (!response.ok) {
    const errData = await response.json().catch(() => ({}));
    throw new Error(errData.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  return data.choices[0].message.content;
}

/* ── 对话历史管理 ── */
let chatHistory = [
  {
    role: 'system',
    content: '你是"去月球起飞基地"的 AI 助手，一个来自月球的智能航行系统。请用中文回答，语气简洁而富有想象力，适当加入一些太空科幻的元素。'
  }
];

function buildConversationHistory(userMessage) {
  // 把用户新消息加入历史
  chatHistory.push({ role: 'user', content: userMessage });
  // 保持不超过 20 条（去掉最早的 system 外的消息）
  if (chatHistory.length > 21) {
    chatHistory = [chatHistory[0], ...chatHistory.slice(-20)];
  }
  return chatHistory;
}

function showError(text) {
  // 在消息区显示错误
  const errDiv = document.createElement('div');
  errDiv.className = 'api-error';
  errDiv.textContent = text;
  messagesEl.appendChild(errDiv);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  setTimeout(() => errDiv.remove(), 8000);
}

function appendMsg(role, text, model) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (role === 'ai' && model) {
    const tag = document.createElement('div');
    tag.className = 'msg-model-tag';
    tag.textContent = model;
    bubble.appendChild(tag);

    // 把 AI 回复也加入历史
    chatHistory.push({ role: 'assistant', content: text });
  }

  const content = document.createElement('div');
  content.textContent = text;
  bubble.appendChild(content);

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

let typingCounter = 0;
function appendTyping() {
  const id = 'typing-' + (++typingCounter);
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = id;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  const tag = document.createElement('div');
  tag.className = 'msg-model-tag';
  tag.textContent = currentModel;
  bubble.appendChild(tag);

  const dots = document.createElement('div');
  dots.className = 'typing-dot';
  dots.innerHTML = '<span></span><span></span><span></span>';
  bubble.appendChild(dots);

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}
</script>
</body>
</html>
